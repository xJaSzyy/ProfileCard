<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: #1e293b;
            padding: 40px;
            border-radius: 16px;
            width: 350px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: fadeIn 1s ease;
        }

        h1 {
            margin: 0 0 10px;
            font-weight: 700;
        }

        h2 {
            margin: 0;
            font-weight: 300;
            color: #94a3b8;
            font-size: 16px;
        }

        .section {
            margin-top: 25px;
        }

        .section-title {
            font-size: 12px;
            text-transform: uppercase;
            color: #64748b;
            margin-bottom: 10px;
        }

        .tag {
            display: inline-block;
            background: #334155;
            padding: 5px 10px;
            border-radius: 8px;
            margin: 3px;
            font-size: 12px;
        }

        a {
            color: #38bdf8;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        ul {
            padding-left: 20px;
            margin: 0;
        }

        li {
            margin-bottom: 5px;
            color: #cbd5f5;
        }

        .contacts a {
            margin-right: 15px;
            font-size: 20px;
            color: #94a3b8;
            transition: 0.3s;
        }

        .contacts a:hover {
            color: #38bdf8;
            transform: translateY(-2px);
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(10px);}
            to {opacity: 1; transform: translateY(0);}
        }
    </style>
</head>

<body>
<div class="card">
    <h1>Новоселов Степан</h1>
    <h2>Backend Developer</h2>

    <div class="section">
        <div class="section-title">О себе</div>
        <ul>
            <li>Магистрант</li>
            <li>Разработчик</li>
            <li>22 года</li>
        </ul>
    </div>

    <div class="section">
        <div class="section-title">Хобби</div>
        <span class="tag">Волейбол</span>
        <span class="tag">Спидкубинг</span>
        <span class="tag">Настольные игры</span>
        <span class="tag">Аниме</span>
    </div>
    
    <div class="section">
        <div class="section-title">Стек</div>
        <span class="tag">C#</span>
        <span class="tag">.NET</span>
        <span class="tag">Unity</span>
        <span class="tag">Docker</span>
        <span class="tag">PostgreSQL</span>
        <span class="tag">MongoDB</span>
        <span class="tag">Kotlin</span>
        <span class="tag">JavaScript</span>
        <span class="tag">Python</span>
    </div>
    
    <div class="section">
        <div class="section-title">Контакты</div>
        <div class="contacts">
            <a href="https://github.com/xJaSzyy"><i class="fab fa-github"></i></a>
            <a href="https://t.me/@xJasz"><i class="fab fa-telegram"></i></a>
            <a href="mailto:novosel.stepan@gmail.com"><i class="fas fa-envelope"></i></a>
        </div>
    </div>
</div>
</body>
</html>
